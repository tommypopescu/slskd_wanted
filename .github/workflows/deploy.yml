name: Build and Push (GHCR)

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true   # rezolvă warning-ul Node20

jobs:
  docker:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write   # necesar pentru GHCR

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & Push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: app/Dockerfile      # 🔥 FIX 1: locația corectă a Dockerfile-ului
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/muserrenamer:latest
            ghcr.io/${{ github.repository_owner }}/muserrenamer:${{ github.sha }}
          platforms: linux/amd64    # opțional dar recomandat