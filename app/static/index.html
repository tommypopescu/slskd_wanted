<!DOCTYPE html>
<html>
<head>
<title>Wanted list</title>
<style>
body{background:#111;color:#eee;font-family:Arial;padding:20px}
table{width:100%;border-collapse:collapse}
th,td{padding:10px;border-bottom:1px solid #333}
.status{padding:4px 8px;border-radius:4px;font-weight:bold}
.new{background:#555}
.found{background:#2d5eff}
.details{background:#1a1a1a;padding:10px;margin-top:5px}
.source{padding:5px 0;border-bottom:1px solid #333}
button{padding:4px 8px;margin-left:5px}
</style>
</head>

<body>
<h1>Wanted list</h1>
<input id="q"><button onclick="add()">Add</button>

<table>
<tr><th>Query</th><th>Status</th><th>Info</th></tr>
<tbody id="t"></tbody>
</table>

<script>
function openSlskd(user){
    window.open(`/ui/#/users/${user}`, "_blank");
}

async function load(){
 const data = await fetch('/wanted').then(r=>r.json());
 t.innerHTML="";
 data.forEach(i=>{
  let sources = [];
  try{ sources = JSON.parse(i.found_sources||"[]"); }catch{}

  let srcHtml = sources.map(s=>`
    <div class="source">
      <b>${s.user}</b> — ${s.bitrate}kbps — ${Math.round(s.size/1024/1024)} MB
      <br><code>${s.path}</code>
      <button onclick="openSlskd('${s.user}')">Open in slskd</button>
    </div>`).join("");

  t.innerHTML+=`
<tr>
<td>${i.query}</td>
<td><span class="status ${i.status}">${i.status}</span></td>
<td>
${i.last_message}
${sources.length?`<div class="details">${srcHtml}</div>`:""}
</td>
</tr>`;
 });
}

async function add(){
 const q=document.getElementById('q').value;
 await fetch('/wanted',{method:"POST",headers:{'Content-Type':'application/json'},body:JSON.stringify({query:q})});
 q.value="";
 load();
}

load();
setInterval(load,10000);
</script>
</body>
</html>
