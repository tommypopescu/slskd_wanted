<!DOCTYPE html>
<html>
<head>
    <title>slskd Wanted List</title>
    <style>
        body { font-family: Arial; padding:20px; }
        ul { list-style-type:none; padding:0; }
        li { margin:8px 0; }
    </style>
</head>
<body>

<h2>Wanted List</h2>

<input id="query" type="text" placeholder="Melodie" style="width:300px;">
<button onclick="addWanted()">Adaugă</button>

<ul id="wanted"></ul>

<hr>

<h3>Setări Worker</h3>
<label>Pauză între cicluri (minute):</label>
<input id="cyclePause" type="number" min="1" max="240" />
<button onclick="saveConfig()">Salvează</button>

<script>
async function loadWanted() {
    const list = await fetch('/wanted').then(r=>r.json());
    const ul = document.getElementById("wanted");
    ul.innerHTML = "";
    list.forEach(x=>{
        const li=document.createElement("li");
        li.textContent=x.query + " ";

        const del=document.createElement("button");
        del.textContent="Șterge";
        del.onclick=async()=>{ 
            await fetch('/wanted/'+x.id,{method:"DELETE"});
            loadWanted();
        };

        li.appendChild(del);
        ul.appendChild(li);
    });
}

async function addWanted() {
    const q=document.getElementById("query").value;
    await fetch('/wanted',{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({query:q})
    });
    document.getElementById("query").value="";
    loadWanted();
}

async function loadConfig() {
    const cfg = await fetch('/config').then(r=>r.json());
    document.getElementById("cyclePause").value = cfg.cycle_pause_minutes;
}

async function saveConfig() {
    const val = parseInt(document.getElementById("cyclePause").value);
    await fetch('/config', {
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({cycle_pause_minutes: val})
    });
    alert("Salvat!");
}

loadWanted();
loadConfig();
</script>

</body>
</html>
