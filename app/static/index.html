<!DOCTYPE html>
<html>
<head>
<title>Wanted list</title>
<style>
body{background:#111;color:#eee;font-family:Arial;padding:20px}
table{width:100%;border-collapse:collapse}
th,td{padding:8px;border-bottom:1px solid #333}
.status{padding:4px 6px;border-radius:4px;font-weight:bold}
.new{background:#555}
.queued{background:#ff9800;color:black}
.waiting{background:#ffd54f;color:black}
.downloaded{background:#4caf50}
button{padding:5px 8px;margin-right:5px}
</style>
</head>
<body>

<h1>Wanted list</h1>
<input id="q"><button onclick="add()">Add</button>

<table>
<thead><tr><th>Query</th><th>Status</th><th>Info</th><th>Action</th></tr></thead>
<tbody id="t"></tbody>
</table>

<script>
const CD=30;

function mins(ts){
 if(!ts)return "";
 const d=new Date(ts);const n=(d.getTime()+CD*60000-Date.now())/60000;
 return n>0?Math.ceil(n)+" min":"ready";
}

async function load(){
 const data=await fetch('/wanted').then(r=>r.json());
 t.innerHTML="";
 data.forEach(i=>{
  t.innerHTML+=`<tr>
<td>${i.query}</td>
<td><span class="status ${i.status}">${i.status}</span></td>
<td>${i.last_message}<br><small>${mins(i.last_attempt)}</small></td>
<td>
<button onclick="retry('${i.id}')">Retry now</button>
<button onclick="del('${i.id}')">Remove</button>
</td>
</tr>`;
 });
}

async function add(){
 const q=document.getElementById('q').value;
 await fetch('/wanted',{method:"POST",headers:{'Content-Type':'application/json'},body:JSON.stringify({query:q})});
 q.value="";
 load();
}

async function retry(id){ await fetch(`/wanted/${id}/retry`,{method:"POST"}); load();}
async function del(id){ await fetch(`/wanted/${id}`,{method:"DELETE"}); load();}

load();setInterval(load,5000);
</script>
</body>
</html>
