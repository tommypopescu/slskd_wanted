<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<title>Wanted Downloads</title>

<style>
    body {
        font-family: Arial, Helvetica, sans-serif;
        background-color: #111;
        color: #eee;
        padding: 20px;
    }

    h1 {
        margin-bottom: 10px;
    }

    table {
        border-collapse: collapse;
        width: 100%;
        margin-top: 20px;
    }

    th, td {
        border-bottom: 1px solid #333;
        padding: 10px;
        text-align: left;
    }

    th {
        background-color: #1b1b1b;
        color: #aaa;
    }

    tr:hover {
        background-color: #1a1a1a;
    }

    input[type="text"] {
        padding: 8px;
        width: 300px;
        border-radius: 4px;
        border: none;
        outline: none;
    }

    button {
        padding: 8px 14px;
        margin-left: 5px;
        border-radius: 4px;
        border: none;
        cursor: pointer;
        background-color: #444;
        color: #fff;
    }

    button:hover {
        background-color: #666;
    }

    /* STATUS COLORS */
    .status {
        padding: 4px 8px;
        border-radius: 4px;
        font-size: 0.9em;
        font-weight: bold;
        display: inline-block;
    }

    .status.new {
        background-color: #555;
        color: #fff;
    }

    .status.found {
        background-color: #2d5eff;
        color: #fff;
    }

    .status.queued {
        background-color: #ff9800;
        color: #000;
    }

    .status.waiting {
        background-color: #ffd54f;
        color: #000;
    }

    .status.downloaded {
        background-color: #2ecc71;
        color: #000;
    }

    .status.error {
        background-color: #e53935;
        color: #fff;
    }

    small {
        color: #aaa;
        display: block;
        margin-top: 4px;
    }
</style>
</head>

<body>

<h1>Wanted list</h1>

<input id="query" type="text" placeholder="Artist - Track">
<button onclick="addWanted()">Add</button>

<table>
    <thead>
        <tr>
            <th>Query</th>
            <th>Status</th>
            <th>Info</th>
            <th>Action</th>
        </tr>
    </thead>
    <tbody id="wantedTable">
    </tbody>
</table>

<script>
async function loadWanted() {
    const data = await fetch('/wanted').then(r => r.json());
    const tbody = document.getElementById("wantedTable");
    tbody.innerHTML = "";

    data.forEach(item => {
        const tr = document.createElement("tr");

        tr.innerHTML = `
            <td>${item.query}</td>
            <td>
                <span class="status ${item.status || 'new'}">
                    ${item.status || 'new'}
                </span>
            </td>
            <td>
                ${item.last_message || '' }
                <small>${item.last_attempt || ''}</small>
            </td>
            <td>
                <button onclick="removeWanted('${item.id}')">Remove</button>
            </td>
        `;

        tbody.appendChild(tr);
    });
}

async function addWanted() {
    const q = document.getElementById("query").value.trim();
    if (!q) return;

    await fetch('/wanted', {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({ query: q })
    });

    document.getElementById("query").value = "";
    loadWanted();
}

async function removeWanted(id) {
    await fetch('/wanted/' + id, { method: "DELETE" });
    loadWanted();
}

loadWanted();
setInterval(loadWanted, 5000);
</script>

</body>
</html>
